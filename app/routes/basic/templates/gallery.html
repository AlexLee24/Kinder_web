<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Kinder</title>
    <link rel="stylesheet" href="{{ url_for('basic.static', filename='css/gallery.css') }}">
    <meta name="description" content="Astronomy image gallery — GREAT Lab, NCU">
    {% include '_favicon.html' %}
</head>
<body>
    {% include '_navbar.html' %}

    <main class="gallery-page">
        <div class="gallery-header">
            <h1 class="gallery-title">Gallery</h1>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <!-- Cards injected by JS -->
            <div class="gallery-skeleton" aria-hidden="true"></div>
            <div class="gallery-skeleton" aria-hidden="true"></div>
            <div class="gallery-skeleton" aria-hidden="true"></div>
            <div class="gallery-skeleton" aria-hidden="true"></div>
            <div class="gallery-skeleton" aria-hidden="true"></div>
            <div class="gallery-skeleton" aria-hidden="true"></div>
        </div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" hidden>
        <button class="lightbox-close" id="lightboxClose" aria-label="Close">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous image">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
        <div class="lightbox-inner">
            <div class="lightbox-img-wrap">
                <img class="lightbox-img" id="lightboxImg" src="" alt="" />
            </div>
            <div class="lightbox-info">
                <h2 class="lightbox-title" id="lightboxTitle"></h2>
                <p class="lightbox-caption" id="lightboxCaption"></p>
                <p class="lightbox-author" id="lightboxAuthor"></p>
            </div>
        </div>
        <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next image">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </button>
    </div>
    <div class="lightbox-backdrop" id="lightboxBackdrop"></div>

    <script src="{{ url_for('basic.static', filename='js/gallery.js') }}"></script>
</body>
</html>
