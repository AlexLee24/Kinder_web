<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREAT Lab Info - Kinder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    <meta name="description" content="GREAT Lab useful links and resources">
    {% include '_favicon.html' %}
    <style>
        /* ── Page layout ── */
        .info-page-wrap {
            width: 90%;
            margin: 40px auto 60px auto;
            max-width: 1600px;
            padding: 50px;
            background-color: rgba(25, 25, 25, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            color: #fff;
            position: relative;
        }
        .info-page-title {
            text-align: center;
            margin-bottom: 10px;
            position: relative;
        }
        .info-page-title h1 {
            font-size: 2.8rem;
            font-weight: 200;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 0;
        }
        .info-page-title p {
            font-size: 1rem;
            opacity: 0.6;
            margin: 8px 0 0 0;
            font-weight: 300;
        }
        
        /* ── Edit Controls ── */
        .edit-controls {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 10px;
        }
        .edit-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .edit-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .edit-btn.save-btn {
            background-color: rgba(77, 184, 255, 0.2);
            border-color: #4db8ff;
            color: #4db8ff;
            display: none;
        }
        .edit-btn.save-btn:hover {
            background-color: #4db8ff;
            color: #111;
        }
        .edit-btn.cancel-btn {
            background-color: rgba(255, 85, 85, 0.2);
            border-color: #ff5555;
            color: #ff5555;
            display: none;
        }
        .edit-btn.cancel-btn:hover {
            background-color: #ff5555;
            color: #111;
        }
        
        .add-action-btn {
            background-color: transparent;
            color: #4db8ff;
            border: 1px dashed rgba(77, 184, 255, 0.5);
            border-radius: 6px;
            padding: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            width: 100%;
            margin-top: 10px;
            display: none;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .add-action-btn:hover {
            background-color: rgba(77, 184, 255, 0.1);
            border-color: #4db8ff;
        }
        .add-card-btn {
            margin-top: 20px;
        }
        .add-section-btn {
            font-size: 1rem;
            padding: 15px;
            margin-top: 30px;
            border-color: rgba(255, 255, 255, 0.3);
            color: #ccc;
        }
        .add-section-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: #fff;
            color: #fff;
        }

        .delete-btn {
            background: none;
            border: none;
            color: rgba(255, 85, 85, 0.7);
            cursor: pointer;
            padding: 4px;
            margin-left: auto;
            border-radius: 4px;
            display: none;
        }
        .delete-btn:hover {
            background: rgba(255, 85, 85, 0.2);
            color: #ff5555;
        }
        .delete-section-btn {
            margin-left: 15px;
            padding: 4px 8px;
        }

        /* Input fields during edit mode */
        .edit-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            width: 100%;
            font-size: inherit;
            font-family: inherit;
            margin-bottom: 4px;
        }
        .edit-input:focus {
            outline: none;
            border-color: #4db8ff;
        }
        
        body.is-editing .add-action-btn,
        body.is-editing .delete-btn {
            display: flex;
        }
        body.is-editing .edit-btn.edit-mode-btn { display: none; }
        body.is-editing .edit-btn.save-btn,
        body.is-editing .edit-btn.cancel-btn { display: flex; }
        
        body.is-editing .info-card,
        body.is-editing .info-section {
            border: 1px dashed rgba(255, 255, 255, 0.2);
            position: relative;
        }
        body.is-editing .info-section { padding: 10px; }
        body.is-editing .info-link-list a { pointer-events: none; }
        
        /* ── Section header ── */
        .info-section {
            margin-top: 40px;
        }
        .info-section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #4db8ff;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(77, 184, 255, 0.2);
        }
        .info-section-title svg { flex-shrink: 0; }

        /* ── Card grid ── */
        .info-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        .info-card {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 12px;
            padding: 20px 22px;
            transition: border-color 0.2s, background 0.2s;
        }
        .info-card:hover {
            background: rgba(0, 0, 0, 0.50);
            border-color: rgba(77, 184, 255, 0.35);
        }
        .info-card-header {
            font-size: 0.85rem;
            font-weight: 600;
            color: #ccc;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        /* ── Link list ── */
        .info-link-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .info-link-list li {
            padding: 7px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-link-list li:last-child { border-bottom: none; padding-bottom: 0; }
        .info-link-list a {
            color: #ddd;
            text-decoration: none;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 0.9rem;
            transition: color 0.15s;
            line-height: 1.4;
        }
        .info-link-list a:hover { color: #4db8ff; }
        .info-link-list a .link-arrow {
            flex-shrink: 0;
            opacity: 0.4;
            margin-top: 2px;
            transition: opacity 0.15s, transform 0.15s;
        }
        .info-link-list a:hover .link-arrow { opacity: 1; transform: translateX(3px); }
        .info-link-desc {
            font-size: 0.75rem;
            color: #666;
            margin-top: 2px;
        }

        /* ── Divider between main-banner sections ── */
        .main-banner {
            height: auto !important;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .main-banner .container {
            width: 100% !important;
            max-width: none !important;
            display: flex;
            justify-content: center;
            padding-top: 100px;
            padding-bottom: 60px;
            margin: 0 !important;
        }
        .banner-content {
            display: block !important;
        }

        /* ── Scroll-to-top ── */
        .scroll-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            opacity: 0;
            pointer-events: none;
            background-color: #1f6feb;
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: opacity 0.3s, transform 0.2s, background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .scroll-to-top:hover { background-color: #388bfd; transform: translateY(-3px); }

        @media (max-width: 700px) {
            .info-page-wrap { width: 95%; max-width: none; padding: 30px 20px; }
            .edit-controls { position: relative; top: 0; right: 0; justify-content: center; margin-bottom: 20px; }
            .info-card-grid { grid-template-columns: 1fr; }
            .info-page-title h1 { font-size: 1.9rem; }
        }
    </style>
</head>
<body>
    {% include '_navbar.html' %}

    <div class="main-banner">
        <div class="container">
            <div class="info-page-wrap">

                <!-- Page Title -->
                <div class="info-page-title">
                    <h1>
                        <img src="{{ url_for('static', filename='photo/Kinder_light.png') }}" alt="Kinder Logo" class="home-logo">
                        GREAT Lab Info
                    </h1>
                    <p>Useful links and resources for GREAT Lab members.</p>
                </div>

                {% if session.get('user', {}).get('is_admin') or session.get('user', {}).get('is_great_lab_member') %}
                <div class="edit-controls">
                    <button class="edit-btn edit-mode-btn" onclick="toggleEditMode()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        Edit Layout
                    </button>
                    <button class="edit-btn save-btn" onclick="saveLayout()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        Save Layout
                    </button>
                    <button class="edit-btn cancel-btn" onclick="cancelEditMode()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        Cancel
                    </button>
                </div>
                {% endif %}

                <!-- Container for dynamically rendering sections -->
                <div id="links-container"></div>
                
                <button class="add-action-btn add-section-btn" onclick="addSection()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Section Block
                </button>

            </div><!-- end info-page-wrap -->
        </div><!-- end container -->
    </div><!-- end main-banner -->

    <script src="{{ url_for('static', filename='js/home.js') }}"></script>

    <!-- UI Logic for rendering and editing -->
    <script>
        let isEditing = false;
        let originalData = [];
        let linkData = [];

        // Fetch data on load
        async function fetchLinks() {
            try {
                const res = await fetch('/api/greatlab_links');
                const result = await res.json();
                if (result.success && result.data) {
                    linkData = JSON.parse(JSON.stringify(result.data));
                    originalData = JSON.parse(JSON.stringify(result.data));
                    renderLayout();
                } else {
                    console.error('Failed to load layout data.');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderLayout() {
            const container = document.getElementById('links-container');
            container.innerHTML = '';

            linkData.forEach((section, sIndex) => {
                const secDiv = document.createElement('div');
                secDiv.className = 'info-section';
                
                // Section Title
                let titleHtml = '';
                if (isEditing) {
                    titleHtml = `
                        <div class="info-section-title" style="display:flex;">
                            <input class="edit-input" type="text" value="${section.title}" onchange="updateSection(${sIndex}, this.value)" style="flex:1;">
                            <button class="delete-btn delete-section-btn" onclick="deleteSection(${sIndex})" title="Delete Section">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6L18 20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    `;
                } else {
                    titleHtml = `
                        <div class="info-section-title">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg>
                            ${section.title}
                        </div>
                    `;
                }
                secDiv.innerHTML = titleHtml;

                // Grid
                const gridDiv = document.createElement('div');
                gridDiv.className = 'info-card-grid';

                (section.cards || []).forEach((card, cIndex) => {
                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'info-card';
                    
                    if (isEditing) {
                        cardDiv.innerHTML = `
                            <div class="info-card-header" style="display:flex;">
                                <input class="edit-input" type="text" value="${card.title}" onchange="updateCard(${sIndex}, ${cIndex}, this.value)" style="flex:1;">
                                <button class="delete-btn" onclick="deleteCard(${sIndex}, ${cIndex})" title="Delete Card">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                </button>
                            </div>
                        `;
                    } else {
                        cardDiv.innerHTML = `<div class="info-card-header">${card.title}</div>`;
                    }

                    const ul = document.createElement('ul');
                    ul.className = 'info-link-list';

                    (card.links || []).forEach((link, lIndex) => {
                        const li = document.createElement('li');
                        
                        if (isEditing) {
                            li.innerHTML = `
                                <div style="display:flex; flex-direction:column; gap:4px; padding-bottom:8px;">
                                    <div style="display:flex; gap:4px;">
                                        <input class="edit-input" type="text" placeholder="Title" value="${link.title || ''}" onchange="updateLink(${sIndex}, ${cIndex}, ${lIndex}, 'title', this.value)" style="flex:1;">
                                        <button class="delete-btn" onclick="deleteLink(${sIndex}, ${cIndex}, ${lIndex})" style="color:#ff5555; background:none; border:none; cursor:pointer;" title="Delete Link">X</button>
                                    </div>
                                    <input class="edit-input" type="text" placeholder="URL" value="${link.url || ''}" onchange="updateLink(${sIndex}, ${cIndex}, ${lIndex}, 'url', this.value)">
                                    <input class="edit-input" type="text" placeholder="Description (Optional)" value="${link.desc || ''}" onchange="updateLink(${sIndex}, ${cIndex}, ${lIndex}, 'desc', this.value)">
                                </div>
                            `;
                        } else {
                            li.innerHTML = `
                                <a href="${link.url}" target="_blank" rel="noopener">
                                    <svg class="link-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                                    <div>
                                        ${link.title}
                                        ${link.desc ? `<div class="info-link-desc">${link.desc}</div>` : ''}
                                    </div>
                                </a>
                            `;
                        }
                        ul.appendChild(li);
                    });

                    // Add Link button
                    if (isEditing) {
                        const addBtn = document.createElement('button');
                        addBtn.className = 'add-action-btn';
                        addBtn.innerHTML = `+ Add Link`;
                        addBtn.onclick = () => addLink(sIndex, cIndex);
                        ul.appendChild(addBtn);
                    }

                    cardDiv.appendChild(ul);
                    gridDiv.appendChild(cardDiv);
                });

                // Add Card button
                if (isEditing) {
                    const addCardDiv = document.createElement('div');
                    addCardDiv.className = 'info-card';
                    addCardDiv.style.background = 'transparent';
                    addCardDiv.style.border = '1px dashed rgba(255,255,255,0.2)';
                    addCardDiv.style.display = 'flex';
                    addCardDiv.style.alignItems = 'center';
                    addCardDiv.style.justifyContent = 'center';
                    
                    const addCardBtn = document.createElement('button');
                    addCardBtn.className = 'add-action-btn add-card-btn';
                    addCardBtn.innerHTML = `+ Add Card Block`;
                    addCardBtn.style.marginTop = '0';
                    addCardBtn.onclick = () => addCard(sIndex);
                    
                    addCardDiv.appendChild(addCardBtn);
                    gridDiv.appendChild(addCardDiv);
                }

                secDiv.appendChild(gridDiv);
                container.appendChild(secDiv);
            });
        }

        // --- Edit Mode Core ---
        function toggleEditMode() {
            isEditing = true;
            document.body.classList.add('is-editing');
            renderLayout();
        }

        function cancelEditMode() {
            isEditing = false;
            document.body.classList.remove('is-editing');
            linkData = JSON.parse(JSON.stringify(originalData));
            renderLayout();
        }

        async function saveLayout() {
            const btn = document.querySelector('.save-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Saving...';
            
            try {
                const res = await fetch('/api/greatlab_links', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: linkData })
                });
                const result = await res.json();
                
                if (result.success) {
                    isEditing = false;
                    document.body.classList.remove('is-editing');
                    originalData = JSON.parse(JSON.stringify(linkData));
                    renderLayout();
                } else {
                    alert('Error saving data: ' + (result.error || 'Unknown error'));
                }
            } catch (err) {
                console.error(err);
                alert('Error saving layout.');
            } finally {
                btn.innerHTML = originalText;
            }
        }

        // --- Data Mutations ---
        function addSection() {
            linkData.push({ title: "New Section", cards: [] });
            renderLayout();
        }
        function updateSection(sIndex, val) {
            linkData[sIndex].title = val;
        }
        function deleteSection(sIndex) {
            if(confirm("Delete this entire section?")) {
                linkData.splice(sIndex, 1);
                renderLayout();
            }
        }

        function addCard(sIndex) {
            linkData[sIndex].cards.push({ title: "New Card Block", links: [] });
            renderLayout();
        }
        function updateCard(sIndex, cIndex, val) {
            linkData[sIndex].cards[cIndex].title = val;
        }
        function deleteCard(sIndex, cIndex) {
            if(confirm("Delete this card block?")) {
                linkData[sIndex].cards.splice(cIndex, 1);
                renderLayout();
            }
        }

        function addLink(sIndex, cIndex) {
            linkData[sIndex].cards[cIndex].links.push({ title: "New Link", url: "#", desc: "" });
            renderLayout();
        }
        function updateLink(sIndex, cIndex, lIndex, field, val) {
            linkData[sIndex].cards[cIndex].links[lIndex][field] = val;
        }
        function deleteLink(sIndex, cIndex, lIndex) {
            linkData[sIndex].cards[cIndex].links.splice(lIndex, 1);
            renderLayout();
        }

        // Init
        document.addEventListener('DOMContentLoaded', fetchLinks);
    </script>
    
    <!-- Scroll-to-top button -->
    <button id="scrollToTopBtn" class="scroll-to-top" title="Go to top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});" aria-label="Scroll to top">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>
    <script>
        (function() {
            var btn = document.getElementById("scrollToTopBtn");
            if (!btn) return;
            function updateBtn() {
                btn.style.opacity = window.scrollY > 300 ? "1" : "0";
                btn.style.pointerEvents = window.scrollY > 300 ? "auto" : "none";
            }
            window.addEventListener('scroll', updateBtn);
            updateBtn();
        })();
    </script>
</body>
</html>
